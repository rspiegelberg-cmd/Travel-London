<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel London — Population Density (LSOA)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #map { height: 100%; }
  .panel {
    background: #fff; padding: 10px 14px; border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,.25); max-width: 270px;
  }
  .panel h1 { font-size: 16px; margin: 0 0 2px; }
  .panel .sub { font-size: 12px; color: #666; margin: 0 0 6px; }
  .panel .hover-name { font-size: 14px; font-weight: 600; margin: 4px 0 2px; }
  .panel .hover-stats { font-size: 12px; color: #333; line-height: 1.5; }
  .panel .hint { font-size: 11px; color: #999; }
  .legend { line-height: 1.4; font-size: 11px; }
  .legend i { width: 14px; height: 14px; float: left; margin-right: 6px; opacity: .85; }
  .legend .title { font-weight: 600; margin-bottom: 4px; }
  #status { font-size: 11px; color: #2a7a2a; margin-top: 6px; }
  #status.err { color: #b00020; }
  #status.loading { color: #b07000; }
  .credits { font-size: 10px; color: #888; margin-top: 6px; }
  .credits a { color: #667; }
  .rw-popup { font-size: 12px; line-height: 1.45; max-width: 260px; }
  .rw-popup .rw-loc { font-weight: 600; margin-bottom: 3px; }
  .rw-popup .rw-meta { color: #555; }
  .rw-popup .rw-sev { font-weight: 600; }
  .leaflet-popup-content { margin: 10px 12px; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data/lsoa-density.js"></script>
<script>
// ----------------------------------------------------------------------
// Travel London — Layer 1 (v2): Population density at LSOA level
// Density: Census 2021 TS006 (ONS, persons/km²) — stored in data/lsoa-density.js
// Boundaries: ONS Open Geography, LSOA 2021 super-generalised (BSC),
//             fetched live from the ONS ArcGIS server in pages.
// ----------------------------------------------------------------------

const BOROUGH_NAMES = ["Barking and Dagenham","Barnet","Bexley","Brent","Bromley","Camden","City of London","Croydon","Ealing","Enfield","Greenwich","Hackney","Hammersmith and Fulham","Haringey","Harrow","Havering","Hillingdon","Hounslow","Islington","Kensington and Chelsea","Kingston upon Thames","Lambeth","Lewisham","Merton","Newham","Redbridge","Richmond upon Thames","Southwark","Sutton","Tower Hamlets","Waltham Forest","Wandsworth","Westminster"];

const LSOA_SERVICE = "https://services1.arcgis.com/ESMARspQHYMw9BZ9/arcgis/rest/services/Lower_layer_Super_Output_Areas_December_2021_Boundaries_EW_BSC_V4/FeatureServer/0/query";
const BOROUGH_OUTLINES = "https://raw.githubusercontent.com/radoi90/housequest-data/master/london_boroughs.geojson";
const EXPECTED = Object.keys(LSOA_DENSITY).length; // 4,994

// Colour scale (persons per km²)
const BREAKS  = [2000, 4000, 6000, 8000, 12000, 16000, 24000, 40000];
const COLOURS = ["#ffffd9","#edf8b1","#c7e9b4","#7fcdbb","#41b6c4","#1d91c0","#225ea8","#253494","#081d58"];
function colourFor(v) {
  let i = 0;
  while (i < BREAKS.length && v >= BREAKS[i]) i++;
  return COLOURS[i];
}

const map = L.map("map", { preferCanvas: true }).setView([51.49, -0.12], 10);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 18
}).addTo(map);

// Info panel
const info = L.control({ position: "topright" });
info.onAdd = function () {
  this._div = L.DomUtil.create("div", "panel");
  this.update();
  return this._div;
};
info.update = function (props) {
  let body;
  if (props) {
    body = '<div class="hover-name">' + props.name + '</div>' +
           '<div class="hover-stats">Code: ' + props.code +
           '<br>Density: ' + props.density.toLocaleString("en-GB") + ' people/km²</div>';
  } else {
    body = '<div class="hint">Hover over an area</div>';
  }
  this._div.innerHTML =
    '<h1>Travel London</h1>' +
    '<p class="sub">Population density — ' + EXPECTED.toLocaleString("en-GB") + ' LSOA areas</p>' + body +
    '<div id="status"></div>' +
    '<div id="rw-status" style="font-size:11px;color:#555;margin-top:4px;"></div>' +
    '<div class="credits">' +
    '<span style="color:#ff8c00;">●</span> planned roadworks · <span style="color:#c0392b;">●</span> live disruptions<br>' +
    'Density: Census 2021 (ONS TS006).<br>Boundaries: ONS Open Geography.<br>Roadworks: TfL Unified API (live).<br>' +
    '<a href="3d.html">3D view</a> · <a href="boroughs.html">Borough view</a></div>';
};
info.addTo(map);

// Legend
const legend = L.control({ position: "bottomright" });
legend.onAdd = function () {
  const div = L.DomUtil.create("div", "panel legend");
  let html = '<div class="title">People per km²</div>';
  const edges = [0].concat(BREAKS);
  for (let i = 0; i < edges.length; i++) {
    const from = edges[i].toLocaleString("en-GB");
    html += '<i style="background:' + COLOURS[i] + '"></i>' +
            from + (BREAKS[i] ? " – " + BREAKS[i].toLocaleString("en-GB") : "+") + "<br>";
  }
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

// ----------------------------------------------------------------------
// Live layer: TfL road disruptions (keyless TfL Unified API)
// One feed; we split it into "Planned roadworks" (category=Works) and
// "Live disruptions" (incidents, delays, asset issues, events).
// ----------------------------------------------------------------------
const TFL_DISRUPTION = "https://api.tfl.gov.uk/Road/all/Disruption";
const plannedLayer = L.layerGroup();   // category === "Works"
const liveLayer    = L.layerGroup();   // everything else

const SEV_COLOUR = { Serious: "#c0392b", Severe: "#c0392b", Moderate: "#e67e22", Minimal: "#f1c40f" };
function sevColour(s) { return SEV_COLOUR[s] || "#e67e22"; }

// Layers control — overlays can be toggled on/off independently.
// Population density overlay is registered once it has loaded.
const layersControl = L.control.layers(null, {
  "Planned roadworks": plannedLayer,
  "Live disruptions": liveLayer
}, { collapsed: false, position: "topleft" }).addTo(map);

function esc(s) { return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function fmtDate(s) {
  if (!s) return "";
  const d = new Date(s);
  return isNaN(d) ? "" : d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}

function disruptionPopup(x) {
  const isWorks = x.category === "Works";
  const dates = (x.startDateTime || x.endDateTime)
    ? '<div class="rw-meta">' + fmtDate(x.startDateTime) + (x.endDateTime ? " → " + fmtDate(x.endDateTime) : "") + "</div>"
    : "";
  return '<div class="rw-popup">' +
    '<div class="rw-loc">' + esc(x.location || x.subCategory || x.category) + "</div>" +
    '<div class="rw-meta"><span class="rw-sev" style="color:' + sevColour(x.severity) + '">' +
      esc(x.severity || "") + "</span> · " + esc(isWorks ? (x.subCategory || "Works") : x.category) + "</div>" +
    (x.comments ? "<div>" + esc(x.comments) + "</div>" : "") +
    (x.currentUpdate ? '<div class="rw-meta"><em>' + esc(x.currentUpdate) + "</em></div>" : "") +
    dates +
    "</div>";
}

function loadDisruptions() {
  fetch(TFL_DISRUPTION)
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(items => {
      let planned = 0, live = 0;
      items.forEach(x => {
        const g = x.geography;
        if (!g || g.type !== "Point" || !g.coordinates) return;
        const lng = g.coordinates[0], lat = g.coordinates[1];
        const isWorks = x.category === "Works";
        const marker = L.circleMarker([lat, lng], {
          radius: x.severity === "Serious" || x.severity === "Severe" ? 8 : (x.severity === "Moderate" ? 6 : 5),
          fillColor: isWorks ? "#ff8c00" : "#c0392b",
          color: "#fff", weight: 1, fillOpacity: 0.9
        }).bindPopup(disruptionPopup(x));
        if (isWorks) { marker.addTo(plannedLayer); planned++; }
        else { marker.addTo(liveLayer); live++; }
      });
      plannedLayer.addTo(map);
      liveLayer.addTo(map);
      const el = document.getElementById("rw-status");
      if (el) el.textContent = planned + " planned roadworks · " + live + " live disruptions";
    })
    .catch(err => {
      const el = document.getElementById("rw-status");
      if (el) { el.textContent = "Roadworks feed unavailable: " + err.message; el.className = "err"; }
    });
}
loadDisruptions();

function setStatus(msg, cls) {
  const el = document.getElementById("status");
  if (el) { el.textContent = msg; el.className = cls || ""; }
}

// Fetch one page of LSOA boundaries from the ONS server (POST avoids URL limits)
function fetchPage(offset) {
  const where = BOROUGH_NAMES.map(b => "LSOA21NM LIKE '" + b + " %'").join(" OR ");
  const body = new URLSearchParams({
    where: where,
    outFields: "LSOA21CD,LSOA21NM",
    outSR: "4326",
    geometryPrecision: "5",
    resultOffset: String(offset),
    f: "geojson"
  });
  return fetch(LSOA_SERVICE, { method: "POST", body: body })
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); });
}

async function loadAll() {
  let features = [];
  let offset = 0;
  for (let page = 0; page < 20; page++) {           // safety cap
    setStatus("Loading boundaries… " + features.length + "/" + EXPECTED, "loading");
    const fc = await fetchPage(offset);
    if (fc.error) throw new Error(fc.error.message || "server error");
    if (!fc.features || !fc.features.length) break;
    features = features.concat(fc.features);
    offset = features.length;
    if (features.length >= EXPECTED) break;
  }
  return features;
}

let geoLayer;
loadAll()
  .then(features => {
    let matched = 0;
    geoLayer = L.geoJSON({ type: "FeatureCollection", features: features }, {
      style: f => {
        const rec = LSOA_DENSITY[f.properties.LSOA21CD];
        return {
          fillColor: rec ? colourFor(rec[1]) : "#cccccc",
          fillOpacity: 0.7,
          color: "#ffffff",
          weight: 0.4
        };
      },
      onEachFeature: (f, layer) => {
        const rec = LSOA_DENSITY[f.properties.LSOA21CD];
        if (rec) matched++;
        layer.on({
          mouseover: e => {
            e.target.setStyle({ weight: 2, color: "#333" });
            if (rec) info.update({ name: rec[0], code: f.properties.LSOA21CD, density: rec[1] });
          },
          mouseout: e => { geoLayer.resetStyle(e.target); info.update(); },
          click: e => map.fitBounds(e.target.getBounds())
        });
      }
    }).addTo(map);

    // Make the density layer toggleable alongside the roadworks layers
    layersControl.addOverlay(geoLayer, "Population density");

    // Borough outlines on top for orientation
    fetch(BOROUGH_OUTLINES).then(r => r.json()).then(geo => {
      L.geoJSON(geo, { style: { fill: false, color: "#555", weight: 1.2 } }).addTo(map);
    }).catch(() => {});

    map.fitBounds(geoLayer.getBounds());
    if (matched === EXPECTED) {
      setStatus(matched.toLocaleString("en-GB") + "/" + EXPECTED.toLocaleString("en-GB") + " areas loaded ✓");
    } else {
      setStatus(matched + "/" + EXPECTED + " areas matched — " + (EXPECTED - matched) + " missing", "err");
    }
  })
  .catch(err => setStatus("Could not load boundaries: " + err.message, "err"));
</script>
</body>
</html>
